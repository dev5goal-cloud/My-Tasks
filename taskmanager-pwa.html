<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Tasks">
<meta name="theme-color" content="#1a1a2e">
<title>My Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f4f8;
  --surface: #ffffff;
  --surface2: #f0f0f6;
  --border: #e8e8f0;
  --text1: #1a1a2e;
  --text2: #6b6b80;
  --text3: #aaaabd;
  --accent: #1a1a2e;
  --red: #e74c3c;
  --amber: #e67e22;
  --green: #27ae60;
  --purple: #7c6fff;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text1);
  overscroll-behavior: none;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
}

/* HEADER */
.header {
  background: var(--accent);
  padding: calc(var(--safe-top) + 16px) 20px 16px;
  flex-shrink: 0;
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; }
.greeting { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'Syne', sans-serif; }
.app-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #fff; margin: 2px 0; }
.date-str { font-size: 12px; color: rgba(255,255,255,0.45); }
.header-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 18px; }

/* STATS */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  background: var(--accent);
  padding: 0 20px 16px;
  flex-shrink: 0;
}
.stat {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 10px 8px;
  text-align: center;
  margin: 0 3px;
}
.stat-n { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #fff; }
.stat-l { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 2px; letter-spacing: 0.5px; }
.stat-n.red { color: #ff7675; }
.stat-n.amber { color: #fdcb6e; }
.stat-n.green { color: #55efc4; }

/* TABS */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 12px;
  gap: 4px;
}
.tab {
  flex: 1;
  padding: 12px 4px 10px;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  position: relative;
  transition: all 0.15s;
}
.tab-dot { width: 6px; height: 6px; border-radius: 50%; transition: all 0.15s; }
.tab-label { font-size: 11px; font-weight: 600; color: var(--text3); font-family: 'Syne', sans-serif; transition: color 0.15s; }
.tab.active .tab-label { color: var(--text1); }
.tab-bar { position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; border-radius: 2px; opacity: 0; transition: opacity 0.15s; }
.tab.active .tab-bar { opacity: 1; }
.tab-count { font-size: 9px; background: var(--text3); color: #fff; border-radius: 10px; padding: 1px 5px; font-weight: 700; transition: background 0.15s; }
.tab.active .tab-count { }

/* SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--safe-bottom) + 90px);
}

/* SECTION */
.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 20px 6px;
}

/* TASK CARD */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin: 0 16px 8px;
  padding: 13px 14px;
  display: flex;
  align-items: flex-start;
  gap: 11px;
  position: relative;
  overflow: hidden;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-user-select: none;
}
.task-card:active { transform: scale(0.985); }
.task-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
}
.pri-high::before { background: var(--red); }
.pri-medium::before { background: var(--amber); }
.pri-low::before { background: var(--green); }
.pri-none::before { background: var(--border); }

.cb {
  width: 24px; height: 24px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  background: transparent;
}
.cb.done {
  background: var(--green);
  border-color: var(--green);
}
.cb.done::after {
  content: '';
  width: 6px; height: 10px;
  border: 2px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(45deg) translateY(-1px);
  display: block;
}

.task-body { flex: 1; min-width: 0; }
.task-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text1);
  line-height: 1.4;
  word-break: break-word;
}
.task-title.crossed {
  text-decoration: line-through;
  color: var(--text3);
}
.task-desc {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  line-height: 1.45;
}
.chips { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
.chip {
  font-size: 10px;
  padding: 2px 9px;
  border-radius: 20px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
}
.c-high { background: #fdecea; color: #c0392b; }
.c-medium { background: #fef3e2; color: #b7770d; }
.c-low { background: #eafaf1; color: #1e8449; }
.c-pending { background: var(--surface2); color: var(--text3); }
.c-done { background: #eafaf1; color: #1e8449; }
.c-person { background: #f0eeff; color: #5b4fcf; }
.c-date { background: #fff8e8; color: #9a6600; }
.c-overdue { background: #fdecea; color: #c0392b; }

.task-time { font-size: 10px; color: var(--text3); margin-top: 6px; }

.task-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.icon-btn {
  background: transparent;
  border: none;
  width: 30px; height: 30px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  color: var(--text3);
  transition: all 0.15s;
}
.icon-btn:active { background: var(--surface2); transform: scale(0.9); }

/* FOLLOW UP person row */
.fu-person {
  display: flex; align-items: center; gap: 7px;
  margin-top: 8px;
}
.avatar {
  width: 24px; height: 24px;
  border-radius: 7px;
  background: #f0eeff;
  color: #5b4fcf;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Syne', sans-serif;
}
.fu-name { font-size: 12px; color: var(--text2); }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 20px);
  left: 50%; transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 448px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 16px;
  padding: 16px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.5px;
  box-shadow: 0 6px 24px rgba(26,26,46,0.3);
  z-index: 100;
  transition: transform 0.1s;
}
.fab:active { transform: translateX(-50%) scale(0.97); }
.fab-plus { font-size: 22px; line-height: 1; }

/* MODAL */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(var(--safe-bottom) + 24px);
  width: 100%; max-width: 480px;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 16px; }
.modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text1); margin-bottom: 18px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; display: block; font-family: 'Syne', sans-serif; letter-spacing: 0.5px; }
.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text1);
  background: var(--surface);
  margin-bottom: 14px;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.form-input:focus { outline: none; border-color: var(--purple); }
textarea.form-input { resize: vertical; min-height: 70px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-row { display: flex; gap: 10px; margin-top: 6px; }
.btn-cancel {
  flex: 1; padding: 14px;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  background: transparent;
  color: var(--text2);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
}
.btn-save {
  flex: 2; padding: 14px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: #fff;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  transition: opacity 0.15s;
}
.btn-save:active { opacity: 0.85; }
.btn-save:disabled { background: var(--border); color: var(--text3); }

/* INSTALL BANNER */
.install-banner {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  margin: 12px 16px;
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.install-banner.hidden { display: none; }
.install-text { flex: 1; }
.install-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #fff; }
.install-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; }
.install-close { color: rgba(255,255,255,0.6); font-size: 18px; padding: 4px; cursor: pointer; }

/* iOS install guide */
.ios-guide {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin: 8px 16px;
  padding: 14px 16px;
  display: none;
}
.ios-guide.show { display: block; }
.ios-step { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; color: var(--text2); }
.ios-step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Syne', sans-serif; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="greeting">Good day</div>
        <div class="app-title">My Tasks</div>
        <div class="date-str" id="date-str"></div>
      </div>
      <div class="header-icon">📋</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n red" id="s-high">0</div><div class="stat-l">High</div></div>
    <div class="stat"><div class="stat-n amber" id="s-pending">0</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n green" id="s-done">0</div><div class="stat-l">Done</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="daily" onclick="switchTab('daily')">
      <div class="tab-dot" style="background:#7c6fff"></div>
      <div class="tab-label">Daily</div>
      <div class="tab-bar" style="background:#7c6fff"></div>
      <div class="tab-count" id="cnt-daily" style="background:#7c6fff">0</div>
    </button>
    <button class="tab" data-tab="followup" onclick="switchTab('followup')">
      <div class="tab-dot" style="background:#e67e22"></div>
      <div class="tab-label">Follow Up</div>
      <div class="tab-bar" style="background:#e67e22"></div>
      <div class="tab-count" id="cnt-followup" style="background:#e67e22">0</div>
    </button>
    <button class="tab" data-tab="others" onclick="switchTab('others')">
      <div class="tab-dot" style="background:#27ae60"></div>
      <div class="tab-label">Others</div>
      <div class="tab-bar" style="background:#27ae60"></div>
      <div class="tab-count" id="cnt-others" style="background:#27ae60">0</div>
    </button>
  </div>

  <div class="scroll-area" id="scroll-area">
    <!-- iOS install guide -->
    <div class="ios-guide" id="ios-guide">
      <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#1a1a2e;margin-bottom:10px">📱 Add to iPhone Home Screen</div>
      <div class="ios-step"><div class="ios-step-num">1</div>Tap the Share button <strong>⬆️</strong> at bottom of Safari</div>
      <div class="ios-step"><div class="ios-step-num">2</div>Scroll down → tap <strong>"Add to Home Screen"</strong></div>
      <div class="ios-step"><div class="ios-step-num">3</div>Tap <strong>"Add"</strong> — done! App icon appears on home screen</div>
      <button onclick="document.getElementById('ios-guide').classList.remove('show')" style="margin-top:10px;width:100%;padding:10px;border:1px solid #e8e8f0;border-radius:10px;background:transparent;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600">Got it ✓</button>
    </div>

    <div id="task-list"></div>
  </div>
</div>

<button class="fab" onclick="openModal()">
  <span class="fab-plus">+</span> Add Task
</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add Task</div>

    <label class="form-label">TITLE *</label>
    <input class="form-input" id="f-title" type="text" placeholder="What needs to be done?">

    <label class="form-label">DESCRIPTION</label>
    <textarea class="form-input" id="f-desc" placeholder="Notes, details..."></textarea>

    <div class="form-row">
      <div>
        <label class="form-label">CATEGORY</label>
        <select class="form-input" id="f-cat" onchange="onCatChange()">
          <option value="daily">Daily</option>
          <option value="followup">Follow Up</option>
          <option value="others">Others</option>
        </select>
      </div>
      <div>
        <label class="form-label">PRIORITY</label>
        <select class="form-input" id="f-pri">
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
          <option value="none">— None</option>
        </select>
      </div>
    </div>

    <div id="fu-fields" style="display:none">
      <label class="form-label">FOLLOWING UP WITH</label>
      <input class="form-input" id="f-person" type="text" placeholder="Person or Team name">
      <label class="form-label">FOLLOW UP DATE</label>
      <input class="form-input" id="f-fudate" type="text" placeholder="e.g. 25 May, Friday">
    </div>

    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
const KEY = 'mytasks_pwa_v1';
let tasks = [];
let tab = 'daily';
let editId = null;

// LOAD
function load() {
  try { const d = localStorage.getItem(KEY); if (d) tasks = JSON.parse(d); } catch(e) {}
  render();
  updateDateStr();
  checkIOSInstall();
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(tasks)); } catch(e) {}
}

function getId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function updateDateStr() {
  document.getElementById('date-str').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', day: 'numeric', month: 'long'
  });
}

function checkIOSInstall() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem('ios_guide_dismissed');
  if (isIOS && !isStandalone && !dismissed) {
    document.getElementById('ios-guide').classList.add('show');
    localStorage.setItem('ios_guide_dismissed', '1');
  }
}

// TABS
function switchTab(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.getElementById('f-cat').value = t;
  onCatChange();
  render();
}

// STATS & COUNTS
function updateStats() {
  document.getElementById('s-high').textContent = tasks.filter(t => t.priority === 'high' && !t.done).length;
  document.getElementById('s-pending').textContent = tasks.filter(t => !t.done).length;
  document.getElementById('s-done').textContent = tasks.filter(t => t.done).length;
  ['daily','followup','others'].forEach(cat => {
    document.getElementById('cnt-' + cat).textContent = tasks.filter(t => t.category === cat && !t.done).length;
  });
}

// RENDER
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function priClass(p) { return {high:'c-high',medium:'c-medium',low:'c-low',none:''}[p]||''; }
function priLabel(p) { return {high:'High',medium:'Medium',low:'Low',none:''}[p]||''; }

function initials(name) {
  return (name||'').trim().split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2) || '?';
}

function taskHTML(t) {
  const isfu = t.category === 'followup';
  return `
  <div class="task-card pri-${t.priority||'none'}" style="opacity:${t.done?0.6:1}">
    <div class="cb ${t.done?'done':''}" onclick="toggleDone('${t.id}')"></div>
    <div class="task-body">
      <div class="task-title ${t.done?'crossed':''}">${esc(t.title)}</div>
      ${t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : ''}
      ${isfu && t.person ? `<div class="fu-person"><div class="avatar">${esc(initials(t.person))}</div><div class="fu-name">${esc(t.person)}</div></div>` : ''}
      <div class="chips">
        ${t.priority!=='none' ? `<span class="chip ${priClass(t.priority)}">${priLabel(t.priority)}</span>` : ''}
        ${isfu && t.fuDate ? `<span class="chip c-date">📅 ${esc(t.fuDate)}</span>` : ''}
        <span class="chip ${t.done?'c-done':'c-pending'}">${t.done?'Done':'Pending'}</span>
      </div>
      <div class="task-time">Added ${esc(t.added||'')}</div>
    </div>
    <div class="task-actions">
      <button class="icon-btn" onclick="editTask('${t.id}')" title="Edit">✏️</button>
      <button class="icon-btn" onclick="deleteTask('${t.id}')" title="Delete">🗑️</button>
    </div>
  </div>`;
}

function render() {
  updateStats();
  const list = tasks.filter(t => t.category === tab);
  const pending = list.filter(t => !t.done);
  const done = list.filter(t => t.done);
  let html = '';
  if (!list.length) {
    const icons = {daily:'📋',followup:'🔁',others:'📁'};
    const msgs = {daily:'No daily tasks yet.',followup:'No follow-up tasks.',others:'Nothing here yet.'};
    html = `<div class="empty"><div class="empty-icon">${icons[tab]}</div><div class="empty-title">${msgs[tab]}</div><div class="empty-sub">Tap "+ Add Task" to get started.</div></div>`;
  } else {
    if (pending.length) {
      html += `<div class="section-label">Pending · ${pending.length}</div>`;
      pending.forEach(t => html += taskHTML(t));
    }
    if (done.length) {
      html += `<div class="section-label" style="margin-top:8px">Completed · ${done.length}</div>`;
      done.forEach(t => html += taskHTML(t));
    }
  }
  document.getElementById('task-list').innerHTML = html;
}

// MODAL
function openModal(id) {
  editId = id || null;
  const t = id ? tasks.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = id ? 'Edit Task' : 'Add Task';
  document.getElementById('btn-save').textContent = id ? 'Save Changes' : 'Add Task';
  document.getElementById('f-title').value = t ? t.title : '';
  document.getElementById('f-desc').value = t ? (t.desc||'') : '';
  document.getElementById('f-cat').value = t ? t.category : tab;
  document.getElementById('f-pri').value = t ? (t.priority||'medium') : 'medium';
  document.getElementById('f-person').value = t ? (t.person||'') : '';
  document.getElementById('f-fudate').value = t ? (t.fuDate||'') : '';
  onCatChange();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 350);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function onCatChange() {
  const val = document.getElementById('f-cat').value;
  document.getElementById('fu-fields').style.display = val === 'followup' ? 'block' : 'none';
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor = '#e74c3c'; return; }
  document.getElementById('f-title').style.borderColor = '';
  const now = new Date().toLocaleDateString('en-IN', {day:'numeric',month:'short'}) + ' · ' +
              new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
  const cat = document.getElementById('f-cat').value;
  const task = {
    id: editId || getId(),
    title,
    desc: document.getElementById('f-desc').value.trim(),
    category: cat,
    priority: document.getElementById('f-pri').value,
    person: document.getElementById('f-person').value.trim(),
    fuDate: document.getElementById('f-fudate').value.trim(),
    done: editId ? (tasks.find(x=>x.id===editId)||{}).done||false : false,
    added: editId ? ((tasks.find(x=>x.id===editId)||{}).added||now) : now,
  };
  if (editId) tasks = tasks.map(t => t.id === editId ? task : t);
  else tasks.unshift(task);
  save();
  closeModal();
  if (cat !== tab) switchTab(cat); else render();
}

function toggleDone(id) {
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  save(); render();
}

function editTask(id) { openModal(id); }

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

load();

// Service Worker for offline support
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'mytasks-v1';
    const ASSETS = [self.location.pathname];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([sw], {type: 'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
